<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Accounts - RupeeTrail</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4F46E5">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/offline.js"></script>
    <script src="js/state.js"></script>
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="app-sidebar hide-on-mobile">
            <div class="sidebar-header"><h2>RupeeTrail</h2></div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-link"><i class='bx bx-grid-alt'></i> Dashboard</a>
                <a href="transactions.html" class="nav-link"><i class='bx bx-list-ul'></i> Transactions</a>
                <a href="reports.html" class="nav-link"><i class='bx bx-pie-chart-alt-2'></i> Reports</a>
                <a href="accounts.html" class="nav-link active"><i class='bx bx-wallet'></i> Accounts</a>
                <a href="settings.html" class="nav-link"><i class='bx bx-cog'></i> Settings</a>
            </nav>
        </aside>

        <div class="app-main">
            <!-- Topbar -->
            <header class="app-header">
                <div class="header-left"><h1 class="page-title">Accounts</h1></div>
                <div class="header-right" style="display: flex; gap: 15px; align-items: center;">
                    <i class='bx bx-log-out hide-on-desktop' style="font-size: 24px; color: var(--text-muted); cursor: pointer;" onclick="UI.logout()"></i>
                    <div class="user-avatar" style="width: 36px; height: 36px; border-radius: 50%; background: var(--gradient-primary); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; box-shadow: var(--shadow-sm);">SR</div>
                </div>
            </header>

            <main class="app-content animate-fade-in">
                <!-- Net Worth -->
                <div class="net-worth-card" id="netWorthCard">
                    <p style="margin-bottom: var(--space-1); opacity: 0.9; font-size: var(--font-size-sm);">Total Net Worth</p>
                    <h2 id="totalNetWorth" style="margin: 0; font-size: 2.5rem; font-family: var(--font-family-heading);">₹0</h2>
                </div>

                <!-- Actions -->
                <div class="action-bar">
                    <button class="btn btn-primary" style="flex: 1; border-radius: var(--radius-full);" onclick="openAccountSheet()">
                        <i class='bx bx-plus-circle' style="margin-right: 0.5rem;"></i> Add Account
                    </button>
                    <button class="btn btn-secondary" style="flex: 1; border-radius: var(--radius-full);" onclick="openTransferSheet()">
                        <i class='bx bx-transfer' style="margin-right: 0.5rem;"></i> Transfer
                    </button>
                </div>

                <!-- Accounts Grid -->
                <div class="section-header" style="display: flex; justify-content: space-between; margin-bottom: var(--space-4);">
                    <h3 class="section-title" style="margin: 0;">My Accounts</h3>
                </div>
                <div class="accounts-grid" id="accountsGrid">
                    <div class="account-card skeleton"></div>
                    <div class="account-card skeleton"></div>
                    <div class="account-card skeleton"></div>
                </div>
            </main>

            <!-- Bottom Navigation -->
            <nav class="bottom-nav hide-on-desktop">
                <a href="dashboard.html" class="nav-item"><i class='bx bx-grid-alt'></i><span>Dash</span></a>
                <a href="transactions.html" class="nav-item"><i class='bx bx-list-ul'></i><span>Txns</span></a>
                <a href="reports.html" class="nav-item"><i class='bx bx-pie-chart-alt-2'></i><span>Reports</span></a>
                <a href="accounts.html" class="nav-item active"><i class='bx bx-wallet'></i><span>Accounts</span></a>
                <a href="settings.html" class="nav-item"><i class='bx bx-cog'></i><span>Settings</span></a>
            </nav>
        </div>
    </div>

    <!-- Bottom Sheets Overlay -->
    <div class="bottom-sheet-overlay" id="sheetOverlay"></div>

    <!-- Account Bottom Sheet (Add/Edit) -->
    <div class="bottom-sheet" id="accountSheet">
        <div class="bottom-sheet-header">
            <h3 id="accountSheetTitle" style="margin: 0; font-family: var(--font-family-heading);">Add Account</h3>
            <button class="btn btn-ghost" style="padding: 0; font-size: 1.5rem;" onclick="UI.closeSheet()"><i class='bx bx-x'></i></button>
        </div>
        <div class="bottom-sheet-body">
            <form id="accountForm">
                <input type="hidden" id="accId">
                <div class="form-group">
                    <label class="form-label">Account Name</label>
                    <input type="text" id="accName" class="form-input" placeholder="e.g. HDFC Savings" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Account Type</label>
                    <select id="accType" class="form-select" required>
                        <option value="Checking">Checking</option>
                        <option value="Savings">Savings</option>
                        <option value="Credit Card">Credit Card</option>
                        <option value="Wallet">Wallet / Cash</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Starting Balance (₹)</label>
                    <input type="number" id="accBalance" class="form-input" placeholder="0.00" required step="0.01" style="font-size: var(--font-size-2xl); font-weight: bold; font-family: var(--font-family-heading);">
                </div>

                <div class="form-group">
                    <label class="form-label">Account Icon</label>
                    <select id="accIcon" class="form-select" required>
                        <option value="bx-wallet">Wallet</option>
                        <option value="bx-credit-card">Credit Card</option>
                        <option value="bx-money">Cash</option>
                        <option value="bx-buildings">Bank</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Theme Color</label>
                    <select id="accTheme" class="form-select" required>
                        <option value="primary">Blue (Primary)</option>
                        <option value="secondary">Dark (Secondary)</option>
                        <option value="tertiary">Teal (Tertiary)</option>
                        <option value="danger">Red</option>
                        <option value="warning">Orange</option>
                    </select>
                </div>

                <div style="display: flex; gap: var(--space-4); margin-top: var(--space-6);">
                    <button type="button" id="deleteAccBtn" class="btn btn-danger" style="display: none; flex: 1;" onclick="deleteAccount()">Delete</button>
                    <button type="submit" class="btn btn-primary" style="flex: 2;">Save Account</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Transfer Bottom Sheet -->
    <div class="bottom-sheet" id="transferSheet">
        <div class="bottom-sheet-header">
            <h3 style="margin: 0; font-family: var(--font-family-heading);">Transfer Money</h3>
            <button class="btn btn-ghost" style="padding: 0; font-size: 1.5rem;" onclick="UI.closeSheet()"><i class='bx bx-x'></i></button>
        </div>
        <div class="bottom-sheet-body">
            <form id="transferForm">
                <div class="form-group">
                    <label class="form-label">From Account</label>
                    <select id="transferFrom" class="form-select" required></select>
                </div>
                <div style="text-align: center; margin: var(--space-2) 0;">
                    <i class='bx bx-down-arrow-alt' style="font-size: 1.5rem; color: var(--text-muted);"></i>
                </div>
                <div class="form-group">
                    <label class="form-label">To Account</label>
                    <select id="transferTo" class="form-select" required></select>
                </div>
                <div class="form-group">
                    <label class="form-label">Amount (₹)</label>
                    <input type="number" id="transferAmount" class="form-input" placeholder="0.00" required min="1" step="0.01" style="font-size: var(--font-size-2xl); font-weight: bold; font-family: var(--font-family-heading);">
                </div>
                <div class="form-group">
                    <label class="form-label">Note (Optional)</label>
                    <input type="text" id="transferNote" class="form-input" placeholder="e.g. Rent share">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: var(--space-4);">Complete Transfer</button>
            </form>
        </div>
    </div>

    <script src="js/accounts.js"></script>
    <script src="js/pwa.js"></script>
</body>
</html>
