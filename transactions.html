<!DOCTYPE html>
<html lang="en">
<head>
    <script>
      (function() {
        try {
          var s = localStorage.getItem('rupeetrail_settings');
          if (s) {
            var theme = JSON.parse(s).theme;
            if (theme === 'dark') document.documentElement.setAttribute('data-theme','dark');
            else if (theme === 'light') document.documentElement.setAttribute('data-theme','light');
          }
        } catch(e) {}
      })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Transactions - RupeeTrail</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <meta name="theme-color" content="#F4F7FF" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0B0F19" media="(prefers-color-scheme: dark)">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/offline.js"></script>
    <script src="js/state.js"></script>
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar (Desktop) -->
        <aside class="app-sidebar hide-on-mobile">
            <div class="sidebar-header">
                <h2>RupeeTrail</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-link" onclick="event.preventDefault(); UI.navigateTo('dashboard.html')"><i class='bx bx-grid-alt'></i> Dashboard</a>
                <a href="transactions.html" class="nav-link active" onclick="event.preventDefault(); UI.navigateTo('transactions.html')"><i class='bx bx-list-ul'></i> Transactions</a>
                <a href="reports.html" class="nav-link" onclick="event.preventDefault(); UI.navigateTo('reports.html')"><i class='bx bx-pie-chart-alt-2'></i> Reports</a>
                <a href="accounts.html" class="nav-link" onclick="event.preventDefault(); UI.navigateTo('accounts.html')"><i class='bx bx-wallet'></i> Accounts</a>
                <a href="settings.html" class="nav-link" onclick="event.preventDefault(); UI.navigateTo('settings.html')"><i class='bx bx-cog'></i> Settings</a>
            </nav>
        </aside>

        <div class="app-main">
            <!-- Topbar -->
            <header class="app-header">
                <div class="header-left">
                    <h1 class="page-title">Transactions</h1>
                </div>
                <div class="header-right" style="display: flex; gap: 15px; align-items: center;">
                    <i class='bx bx-power-off hide-on-desktop' style="font-size: 24px; color: var(--text-muted); cursor: pointer;" onclick="UI.exitApp()" title="Exit app"></i>
                    <div class="user-popover-container">
                        <i class='bx bx-user-circle user-popover-btn' onclick="UI.toggleUserDropdown(event)"></i>
                        <div class="user-popover" id="userPopover">
                            <a href="settings.html" class="user-popover-item"><i class='bx bx-cog'></i> Settings</a>
                            <div class="user-popover-item" onclick="UI.logout()"><i class='bx bx-log-out'></i> Logout</div>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Main Content -->
            <main class="app-content animate-fade-in">
                
                <!-- Search and Filter Bar -->
                <div class="search-filter-bar">
                    <div class="search-wrapper">
                        <i class='bx bx-search'></i>
                        <input type="text" id="searchInput" class="search-input" placeholder="Search title or category...">
                    </div>
                </div>

                <!-- Filter Chips -->
                <div class="filter-chips" id="filterChips">
                    <div class="chip active" data-filter="all">All</div>
                    <div class="chip" data-filter="income">Income</div>
                    <div class="chip" data-filter="expense">Expense</div>
                    <div class="chip" data-filter="transfer">Transfer</div>
                </div>

                <!-- Transactions List Container -->
                <div id="transactionsContainer">
                    <div class="transaction-item">
                        <div class="transaction-details" style="flex: 1;">
                            <div class="skeleton skeleton-avatar"></div>
                            <div class="transaction-info" style="width: 100%;">
                                <div class="skeleton skeleton-text"></div>
                                <div class="skeleton skeleton-text short" style="margin-bottom: 0;"></div>
                            </div>
                        </div>
                        <div class="skeleton skeleton-text" style="width: 60px; margin-bottom: 0;"></div>
                    </div>
                    <div class="transaction-item">
                        <div class="transaction-details" style="flex: 1;">
                            <div class="skeleton skeleton-avatar"></div>
                            <div class="transaction-info" style="width: 100%;">
                                <div class="skeleton skeleton-text"></div>
                                <div class="skeleton skeleton-text short" style="margin-bottom: 0;"></div>
                            </div>
                        </div>
                        <div class="skeleton skeleton-text" style="width: 60px; margin-bottom: 0;"></div>
                    </div>
                    <div class="transaction-item">
                        <div class="transaction-details" style="flex: 1;">
                            <div class="skeleton skeleton-avatar"></div>
                            <div class="transaction-info" style="width: 100%;">
                                <div class="skeleton skeleton-text"></div>
                                <div class="skeleton skeleton-text short" style="margin-bottom: 0;"></div>
                            </div>
                        </div>
                        <div class="skeleton skeleton-text" style="width: 60px; margin-bottom: 0;"></div>
                    </div>
                    <div class="transaction-item">
                        <div class="transaction-details" style="flex: 1;">
                            <div class="skeleton skeleton-avatar"></div>
                            <div class="transaction-info" style="width: 100%;">
                                <div class="skeleton skeleton-text"></div>
                                <div class="skeleton skeleton-text short" style="margin-bottom: 0;"></div>
                            </div>
                        </div>
                        <div class="skeleton skeleton-text" style="width: 60px; margin-bottom: 0;"></div>
                    </div>
                </div>
                
                <!-- Empty State -->
                <div id="emptyState" class="empty-state" style="display: none;">
                    <i class='bx bx-receipt'></i>
                    <p id="emptyStateMsg">No transactions found.</p>
                    <button id="emptyStateBtn" class="btn btn-primary" style="margin-top: var(--space-4);" onclick="openAddSheet()">Add your first transaction</button>
                </div>

            </main>

            <!-- Floating Add Button for Desktop -->
            <button class="btn btn-primary hide-on-mobile" id="desktopAddBtn" style="position: absolute; bottom: var(--space-6); right: var(--space-6); border-radius: var(--radius-full); padding: var(--space-3) var(--space-5); box-shadow: var(--shadow-lg);">
                <i class='bx bx-plus' style="margin-right: 0.5rem;"></i> New Transaction
            </button>
        </div><!-- /.app-main -->
    </div><!-- /.app-layout -->

    <!-- Bottom Navigation: direct <body> child so position:fixed is
         contained by the viewport, not by any overflow:hidden ancestor -->
    <nav class="bottom-nav hide-on-desktop">
        <a href="dashboard.html" class="nav-item" onclick="event.preventDefault(); UI.navigateTo('dashboard.html')"><i class='bx bx-grid-alt'></i><span>Dash</span></a>
        <a href="transactions.html" class="nav-item active" onclick="event.preventDefault(); UI.navigateTo('transactions.html')"><i class='bx bx-list-ul'></i><span>Txns</span></a>
        <a href="reports.html" class="nav-item" onclick="event.preventDefault(); UI.navigateTo('reports.html')"><i class='bx bx-pie-chart-alt-2'></i><span>Reports</span></a>
        <a href="accounts.html" class="nav-item" onclick="event.preventDefault(); UI.navigateTo('accounts.html')"><i class='bx bx-wallet'></i><span>Accounts</span></a>
        <a href="settings.html" class="nav-item" onclick="event.preventDefault(); UI.navigateTo('settings.html')"><i class='bx bx-cog'></i><span>Settings</span></a>
    </nav>

    <!-- FAB overrides default to open Bottom Sheet -->
    <button class="fab hide-on-desktop" id="fabBtn">
        <i class='bx bx-plus'></i>
    </button>

    <!-- Bottom Sheet overlay and content -->
    <div class="bottom-sheet-overlay" id="sheetOverlay"></div>
    
    <div class="bottom-sheet" id="bottomSheet">
        <div style="width:40px; height:4px; border-radius:2px; background:var(--border-light); margin: 12px auto 0;"></div>
        <div class="bottom-sheet-header">
            <h3 id="sheetTitle" style="margin: 0; font-size: var(--font-size-lg);">Add Transaction</h3>
            <button id="closeSheetBtn" class="btn btn-ghost" style="padding: 0.25rem; font-size: 1.5rem; border-radius: var(--radius-full);"><i class='bx bx-x'></i></button>
        </div>
        <div class="bottom-sheet-body">
            <form id="txForm">
                <input type="hidden" id="txId">
                
                <!-- Type Toggle -->
                <div style="display: flex; gap: var(--space-2); margin-bottom: var(--space-4); background: var(--bg-surface-hover); padding: 0.25rem; border-radius: var(--radius-base);">
                    <button type="button" id="btnExpense" class="btn" style="flex: 1; background: var(--bg-surface); box-shadow: var(--shadow-sm); color: var(--color-danger);">Expense</button>
                    <button type="button" id="btnIncome" class="btn btn-ghost" style="flex: 1; color: var(--text-secondary);">Income</button>
                    <button type="button" id="btnTransfer" class="btn btn-ghost" style="flex: 1; color: var(--text-secondary);">Transfer</button>
                </div>
                <input type="hidden" id="txType" value="expense">

                <!-- Amount -->
                <div class="form-group">
                    <label class="form-label">Amount</label>
                    <div style="position:relative;">
                        <span style="position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--text-secondary); font-size:var(--font-size-xl); font-weight:600; pointer-events:none;"><script>document.write((JSON.parse(localStorage.getItem('rupeetrail_settings')||'{}')).currency || '₹')</script></span>
                        <input type="number" id="txAmount" class="form-input" placeholder="0.00" required min="1" step="0.01" style="font-size: var(--font-size-2xl); font-weight: bold; font-family: var(--font-family-heading); padding-left: 2.5rem;">
                    </div>
                </div>

                <!-- Title -->
                <div class="form-group">
                    <label class="form-label">Title / Notes</label>
                    <input type="text" id="txTitle" class="form-input" placeholder="What was this for?" required>
                </div>

                <!-- Category -->
                <div class="form-group">
                    <label class="form-label">Category</label>
                    <select id="txCategory" class="form-select" required>
                        <!-- Populated dynamically -->
                    </select>
                </div>

                <!-- Date -->
                <div class="form-group">
                    <label class="form-label">Date</label>
                    <input type="date" id="txDate" class="form-input" required>
                </div>

                <!-- Account -->
                <div class="form-group">
                    <label class="form-label">Account</label>
                    <select id="txAccount" class="form-select" required></select>
                </div>

                <!-- Tags -->
                <div class="form-group">
                    <label class="form-label">Tags (Optional)</label>
                    <input type="text" id="txTags" class="form-input" placeholder="e.g. vacation, gift">
                </div>

                <div style="display: flex; gap: var(--space-4); margin-top: var(--space-6);">
                    <button type="button" id="deleteTxBtn" class="btn btn-danger" style="display: none; flex: 1;">Delete</button>
                    <button type="submit" class="btn btn-primary" style="flex: 2;">Save Transaction</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/transactions.js"></script>
    <script src="js/pwa.js"></script>
</body>
</html>
