<!DOCTYPE html>
<html lang="en">
<head>
    <script>
      (function() {
        try {
          var s = localStorage.getItem('rupeetrail_settings');
          if (s) {
            var theme = JSON.parse(s).theme;
            if (theme === 'dark') document.documentElement.setAttribute('data-theme','dark');
            else if (theme === 'light') document.documentElement.setAttribute('data-theme','light');
          }
        } catch(e) {}
      })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard - RupeeTrail</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <meta name="theme-color" content="#F4F7FF" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0B0F19" media="(prefers-color-scheme: dark)">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <!-- Chart.js inclusion -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- API and Global JS -->
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/offline.js"></script>
    <script src="js/state.js"></script>
    <script src="js/charts.js"></script>
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar (Desktop) -->
        <aside class="app-sidebar hide-on-mobile">
            <div class="sidebar-header">
                <h2>RupeeTrail</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-link active" onclick="event.preventDefault(); UI.navigateTo('dashboard.html')"><i class='bx bx-grid-alt'></i> Dashboard</a>
                <a href="transactions.html" class="nav-link" onclick="event.preventDefault(); UI.navigateTo('transactions.html')"><i class='bx bx-list-ul'></i> Transactions</a>
                <a href="reports.html" class="nav-link" onclick="event.preventDefault(); UI.navigateTo('reports.html')"><i class='bx bx-pie-chart-alt-2'></i> Reports</a>
                <a href="accounts.html" class="nav-link" onclick="event.preventDefault(); UI.navigateTo('accounts.html')"><i class='bx bx-wallet'></i> Accounts</a>
                <a href="settings.html" class="nav-link" onclick="event.preventDefault(); UI.navigateTo('settings.html')"><i class='bx bx-cog'></i> Settings</a>
                <div style="flex:1"></div>
                <a href="#" id="logoutBtnDesktop" class="nav-link"><i class='bx bx-log-out'></i> Logout</a>
            </nav>
        </aside>

        <div class="app-main">
            <!-- Topbar -->
            <header class="app-header">
                <div class="header-left">
                    <h1 class="page-title">Dashboard</h1>
                </div>
                <div class="header-right" style="display: flex; gap: 15px; align-items: center;">
                    <i class='bx bx-log-out hide-on-desktop' style="font-size: 24px; color: var(--text-muted); cursor: pointer;" onclick="UI.logout()"></i>
                    <div class="user-popover-container">
                        <i class='bx bx-user-circle user-popover-btn' onclick="UI.toggleUserDropdown(event)"></i>
                        <div class="user-popover" id="userPopover">
                            <a href="settings.html" class="user-popover-item"><i class='bx bx-cog'></i> Settings</a>
                            <div class="user-popover-item" onclick="UI.logout()"><i class='bx bx-log-out'></i> Logout</div>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Main Content -->
            <main class="app-content animate-fade-in">
                
                <!-- Welcome Section -->
                <div style="margin-bottom: var(--space-6);">
                    <p style="color: var(--text-secondary); margin-bottom: var(--space-1); font-size: var(--font-size-sm); font-weight: var(--font-weight-medium);">Welcome back,</p>
                    <h2 style="margin: 0; font-size: var(--font-size-2xl);">Samar Raj</h2>
                </div>

                <!-- 4 Top Stats -->
                <div class="dashboard-stats" id="summaryContainer">
                    <div class="card stat-card skeleton-card skeleton"></div>
                    <div class="card stat-card skeleton-card skeleton"></div>
                    <div class="card stat-card skeleton-card skeleton"></div>
                    <div class="card stat-card skeleton-card skeleton"></div>
                </div>

                <!-- 2 Column Layout for Desktop -->
                <div class="grid lg:grid-cols-3 gap-6">
                    
                    <!-- Left Column: Transactions & Top Category -->
                    <div class="lg:col-span-2 flex flex-col gap-6">
                        <!-- Recent Transactions -->
                        <div class="transactions-section">
                            <div class="section-header">
                                <h3 class="section-title">Recent Transactions</h3>
                                <a href="transactions.html" style="font-size: var(--font-size-sm); font-weight: var(--font-weight-bold); color: var(--color-primary);">View All</a>
                            </div>
                            <div class="transaction-list" id="transactionsContainer">
                                <div class="transaction-item"><div class="skeleton skeleton-avatar"></div><div style="flex:1; margin-left:1rem;"><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text short"></div></div></div>
                            </div>
                        </div>

                        <!-- Top Category -->
                        <div class="budget-section">
                            <div class="section-header">
                                <h3 class="section-title">Top Category</h3>
                            </div>
                            <div class="card" id="budgetContainer" style="padding: var(--space-6);">
                                <div class="skeleton skeleton-text"></div>
                                <div class="skeleton skeleton-text short"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Right Column: Mini Bar Chart -->
                    <div class="chart-section">
                        <div class="section-header">
                            <h3 class="section-title">Daily Spending</h3>
                        </div>
                        <div class="card chart-container" style="padding: var(--space-4); height: 280px; display:flex; flex-direction:column;">
                            <canvas id="overviewChart" style="flex:1;"></canvas>
                        </div>
                    </div>
                </div>
            </main>

            <!-- Bottom Navigation (Mobile) -->
            <nav class="bottom-nav hide-on-desktop">
                <a href="dashboard.html" class="nav-item active" onclick="event.preventDefault(); UI.navigateTo('dashboard.html')"><i class='bx bx-grid-alt'></i><span>Dash</span></a>
                <a href="transactions.html" class="nav-item" onclick="event.preventDefault(); UI.navigateTo('transactions.html')"><i class='bx bx-list-ul'></i><span>Txns</span></a>
                <a href="reports.html" class="nav-item" onclick="event.preventDefault(); UI.navigateTo('reports.html')"><i class='bx bx-pie-chart-alt-2'></i><span>Reports</span></a>
                <a href="accounts.html" class="nav-item" onclick="event.preventDefault(); UI.navigateTo('accounts.html')"><i class='bx bx-wallet'></i><span>Accounts</span></a>
                <a href="settings.html" class="nav-item" onclick="event.preventDefault(); UI.navigateTo('settings.html')"><i class='bx bx-cog'></i><span>Settings</span></a>
            </nav>
            
            <!-- FAB -->
            <button class="fab hide-on-desktop" onclick="window.location.href='transactions.html'">
                <i class='bx bx-plus'></i>
            </button>
        </div>
    </div>

    <script src="js/dashboard.js"></script>
    <script src="js/pwa.js"></script>
</body>
</html>
