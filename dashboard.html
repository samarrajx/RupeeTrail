<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard - RupeeTrail</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4F46E5">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <!-- Chart.js inclusion -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- API and Global JS -->
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/offline.js"></script>
    <script src="js/state.js"></script>
    <script src="js/charts.js"></script>
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar (Desktop) -->
        <aside class="app-sidebar hide-on-mobile">
            <div class="sidebar-header">
                <h2>RupeeTrail</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-link"><i class='bx bx-home'></i> Home</a>
                <a href="dashboard.html" class="nav-link active"><i class='bx bx-grid-alt'></i> Dashboard</a>
                <a href="transactions.html" class="nav-link"><i class='bx bx-list-ul'></i> Transactions</a>
                <a href="reports.html" class="nav-link"><i class='bx bx-pie-chart-alt-2'></i> Reports</a>
                <a href="accounts.html" class="nav-link"><i class='bx bx-wallet'></i> Accounts</a>
                <a href="settings.html" class="nav-link"><i class='bx bx-cog'></i> Settings</a>
            </nav>
        </aside>

        <div class="app-main">
            <!-- Topbar -->
            <header class="app-header">
                <div class="header-left">
                    <h1 class="page-title">Dashboard</h1>
                </div>
                <div class="header-right">
                    <div class="user-avatar" style="width: 36px; height: 36px; border-radius: 50%; background: var(--color-primary); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer;">SR</div>
                </div>
            </header>

            <!-- Main Content -->
            <main class="app-content animate-fade-in">
                
                <!-- Welcome Section -->
                <div style="margin-bottom: var(--space-6);">
                    <p style="color: var(--text-secondary); margin-bottom: var(--space-1); font-size: var(--font-size-sm);">Welcome back,</p>
                    <h2 style="margin: 0; font-size: var(--font-size-2xl);">Samar Raj</h2>
                </div>

                <!-- Summary Cards -->
                <div class="dashboard-stats" id="summaryContainer">
                    <div class="card stat-card skeleton-card skeleton"></div>
                    <div class="card stat-card skeleton-card skeleton"></div>
                    <div class="card stat-card skeleton-card skeleton"></div>
                </div>

                <!-- Chart.js Overview -->
                <div class="chart-section">
                    <div class="section-header">
                        <h3 class="section-title">Overview</h3>
                    </div>
                    <div class="chart-container" style="background: var(--bg-surface); padding: var(--space-4); border-radius: var(--radius-lg); border: 1px solid var(--border-light); height: 260px; box-shadow: var(--shadow-sm);">
                        <canvas id="overviewChart"></canvas>
                    </div>
                </div>

                <!-- Account Cards -->
                <div class="accounts-section">
                    <div class="section-header">
                        <h3 class="section-title">My Accounts</h3>
                    </div>
                    <div class="accounts-scroll" id="accountsContainer">
                        <div class="account-card skeleton"></div>
                        <div class="account-card skeleton"></div>
                    </div>
                </div>

                <!-- Budget Bars Section -->
                <div class="budget-section" style="margin-bottom: var(--space-8);">
                    <div class="section-header">
                        <h3 class="section-title">Budgets</h3>
                        <a href="#" style="font-size: var(--font-size-sm); font-weight: var(--font-weight-medium); color: var(--color-primary);">Manage</a>
                    </div>
                    <div class="budget-list" id="budgetContainer" style="background: var(--bg-surface); padding: var(--space-6); border-radius: var(--radius-lg); border: 1px solid var(--border-light); box-shadow: var(--shadow-sm);">
                        <div class="skeleton skeleton-text"></div>
                        <div class="skeleton skeleton-text short"></div>
                    </div>
                </div>

                <!-- Recent Transactions -->
                <div class="transactions-section" style="margin-bottom: var(--space-4);">
                    <div class="section-header">
                        <h3 class="section-title">Recent Transactions</h3>
                        <a href="transactions.html" style="font-size: var(--font-size-sm); font-weight: var(--font-weight-medium); color: var(--color-primary);">View All</a>
                    </div>
                    <div class="transaction-list" id="transactionsContainer">
                        <div class="transaction-item"><div class="skeleton skeleton-avatar"></div><div style="flex:1; margin-left:1rem;"><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text short"></div></div></div>
                        <div class="transaction-item"><div class="skeleton skeleton-avatar"></div><div style="flex:1; margin-left:1rem;"><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text short"></div></div></div>
                    </div>
                </div>
            </main>

            <!-- Bottom Navigation (Mobile) -->
            <nav class="bottom-nav hide-on-desktop">
                <a href="index.html" class="nav-item"><i class='bx bx-home'></i><span>Home</span></a>
                <a href="dashboard.html" class="nav-item active"><i class='bx bx-grid-alt'></i><span>Dash</span></a>
                <a href="transactions.html" class="nav-item"><i class='bx bx-list-ul'></i><span>Txns</span></a>
                <a href="reports.html" class="nav-item"><i class='bx bx-pie-chart-alt-2'></i><span>Reports</span></a>
                <a href="settings.html" class="nav-item"><i class='bx bx-cog'></i><span>Settings</span></a>
            </nav>
            
            <!-- FAB -->
            <button class="fab hide-on-desktop">
                <i class='bx bx-plus'></i>
            </button>
        </div>
    </div>

    <script src="js/dashboard.js"></script>
    <script src="js/pwa.js"></script>
</body>
</html>
