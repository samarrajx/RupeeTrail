<!DOCTYPE html>
<html lang="en">
<head>
    <script>
      (function() {
        try {
          var s = localStorage.getItem('rupeetrail_settings');
          if (s) {
            var theme = JSON.parse(s).theme;
            if (theme === 'dark') document.documentElement.setAttribute('data-theme','dark');
            else if (theme === 'light') document.documentElement.setAttribute('data-theme','light');
          }
        } catch(e) {}
      })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Settings - RupeeTrail</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <meta name="theme-color" content="#F4F7FF" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0B0F19" media="(prefers-color-scheme: dark)">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/offline.js"></script>
    <script src="js/state.js"></script>
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="app-sidebar hide-on-mobile">
            <div class="sidebar-header"><h2>RupeeTrail</h2></div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-link" onclick="event.preventDefault(); UI.navigateTo('dashboard.html')"><i class='bx bx-grid-alt'></i> Dashboard</a>
                <a href="transactions.html" class="nav-link" onclick="event.preventDefault(); UI.navigateTo('transactions.html')"><i class='bx bx-list-ul'></i> Transactions</a>
                <a href="reports.html" class="nav-link" onclick="event.preventDefault(); UI.navigateTo('reports.html')"><i class='bx bx-pie-chart-alt-2'></i> Reports</a>
                <a href="accounts.html" class="nav-link" onclick="event.preventDefault(); UI.navigateTo('accounts.html')"><i class='bx bx-wallet'></i> Accounts</a>
                <a href="settings.html" class="nav-link active" onclick="event.preventDefault(); UI.navigateTo('settings.html')"><i class='bx bx-cog'></i> Settings</a>
            </nav>
        </aside>

        <div class="app-main">
            <!-- Topbar -->
            <header class="app-header">
                <div class="header-left">
                    <h1 class="page-title">Settings</h1>
                    <span class="sync-indicator" id="sync-indicator"></span>
                </div>
                <div class="header-right" style="display: flex; gap: 15px; align-items: center;">
                    <i class='bx bx-log-out hide-on-desktop' style="font-size: 24px; color: var(--text-muted); cursor: pointer;" onclick="UI.logout()"></i>
                    <div class="user-popover-container">
                        <i class='bx bx-user-circle user-popover-btn' onclick="UI.toggleUserDropdown(event)"></i>
                        <div class="user-popover" id="userPopover">
                            <a href="settings.html" class="user-popover-item"><i class='bx bx-cog'></i> Settings</a>
                            <div class="user-popover-item" onclick="UI.logout()"><i class='bx bx-log-out'></i> Logout</div>
                        </div>
                    </div>
                </div>
            </header>

            <main class="app-content animate-fade-in">
                
                <!-- Appearance Card -->
                <div class="card" style="margin-bottom: var(--space-6); padding: var(--space-4);">
                    <h3 style="margin: 0 0 var(--space-4) 0; display: flex; align-items: center; gap: var(--space-2);">
                        <i class='bx bx-palette' style="color: var(--color-primary);"></i> Appearance
                    </h3>
                    <div class="form-group">
                        <label class="form-label">Theme</label>
                        <select id="themeSelect" class="form-select">
                            <option value="system">System Default</option>
                            <option value="light">Light Mode</option>
                            <option value="dark">Dark Mode</option>
                        </select>
                    </div>
                </div>

                <!-- Regional Settings -->
                <div class="card" style="margin-bottom: var(--space-6); padding: var(--space-4);">
                    <h3 style="margin: 0 0 var(--space-4) 0; display: flex; align-items: center; gap: var(--space-2);">
                        <i class='bx bx-globe' style="color: var(--color-info);"></i> Regional Settings
                    </h3>
                    <div class="form-group">
                        <label class="form-label">Currency Symbol</label>
                        <input type="text" id="currencySymbol" class="form-input" value="₹">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Number Format</label>
                        <select id="numberFormat" class="form-select">
                            <option value="en-IN">Indian (1,00,000.00)</option>
                            <option value="en-US">International (100,000.00)</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" id="saveRegionalBtn">Save Settings</button>
                </div>

                <!-- Security -->
                <div class="card" style="margin-bottom: var(--space-6); padding: var(--space-4);">
                    <h3 style="margin: 0 0 var(--space-4) 0; display: flex; align-items: center; gap: var(--space-2);">
                        <i class='bx bx-lock-alt' style="color: var(--color-warning);"></i> Security
                    </h3>
                    <button class="btn btn-secondary w-full" style="text-align: left; padding: var(--space-3);" onclick="UI.openSheet('sheetOverlay', 'pinSheet')">
                        <i class='bx bx-dialpad-alt' style="margin-right: var(--space-2);"></i> Change PIN
                    </button>
                    <button class="btn btn-ghost w-full" style="text-align: left; padding: var(--space-3); margin-top: var(--space-2); color: var(--color-danger);" id="logoutBtn">
                        <i class='bx bx-log-out' style="margin-right: var(--space-2);"></i> Logout
                    </button>
                </div>

                <!-- Data Management -->
                <div class="card" style="margin-bottom: var(--space-6); padding: var(--space-4); border: 1px solid rgba(244, 63, 94, 0.3);">
                    <h3 style="margin: 0 0 var(--space-4) 0; display: flex; align-items: center; gap: var(--space-2); color: var(--color-danger);">
                        <i class='bx bx-data'></i> Data Management
                    </h3>
                    <p style="font-size: var(--font-size-sm); color: var(--text-muted); margin-bottom: var(--space-4);">
                        Warning: This will permanently delete all your accounts, transactions, and settings locally.
                    </p>
                    <div style="margin-top: var(--space-6);">
                        <button class="btn btn-outline w-full" id="logoutBtn" style="margin-bottom: var(--space-4);" onclick="UI.logout()">
                            <i class='bx bx-log-out'></i> Logout
                        </button>
                        <button class="btn btn-danger w-full" id="clearDataBtn">
                            <i class='bx bx-trash'></i> Clear All Data
                        </button>
                    </div>
                </div>

            </main>

            <nav class="bottom-nav hide-on-desktop">
                <a href="dashboard.html" class="nav-item" onclick="event.preventDefault(); UI.navigateTo('dashboard.html')"><i class='bx bx-grid-alt'></i><span>Dash</span></a>
                <a href="transactions.html" class="nav-item" onclick="event.preventDefault(); UI.navigateTo('transactions.html')"><i class='bx bx-list-ul'></i><span>Txns</span></a>
                <a href="reports.html" class="nav-item" onclick="event.preventDefault(); UI.navigateTo('reports.html')"><i class='bx bx-pie-chart-alt-2'></i><span>Reports</span></a>
                <a href="accounts.html" class="nav-item" onclick="event.preventDefault(); UI.navigateTo('accounts.html')"><i class='bx bx-wallet'></i><span>Accounts</span></a>
                <a href="settings.html" class="nav-item active" onclick="event.preventDefault(); UI.navigateTo('settings.html')"><i class='bx bx-cog'></i><span>Settings</span></a>
            </nav>
        </div>
    </div>

    <!-- Bottom Sheets Overlay -->
    <div class="bottom-sheet-overlay" id="sheetOverlay"></div>

    <!-- Change PIN Sheet -->
    <div class="bottom-sheet" id="pinSheet">
        <div style="width:40px; height:4px; border-radius:2px; background:var(--border-light); margin: 12px auto 0;"></div>
        <div class="bottom-sheet-header">
            <h3 style="margin: 0;">Change PIN</h3>
            <button class="btn btn-ghost" style="padding: 0; font-size: 1.5rem;" onclick="UI.closeSheet()"><i class='bx bx-x'></i></button>
        </div>
        <div class="bottom-sheet-body">
            <form id="pinForm">
                <div class="form-group">
                    <label class="form-label">Current PIN</label>
                    <input type="password" id="oldPin" class="form-input" maxlength="4" pattern="[0-9]{4}" placeholder="••••" required style="font-family: monospace; font-size: 1.5rem; letter-spacing: 0.5rem; text-align: center;">
                </div>
                <div class="form-group">
                    <label class="form-label">New PIN</label>
                    <input type="password" id="newPin" class="form-input" maxlength="4" pattern="[0-9]{4}" placeholder="••••" required style="font-family: monospace; font-size: 1.5rem; letter-spacing: 0.5rem; text-align: center;">
                </div>
                <div class="form-group">
                    <label class="form-label">Confirm New PIN</label>
                    <input type="password" id="confirmPin" class="form-input" maxlength="4" pattern="[0-9]{4}" placeholder="••••" required style="font-family: monospace; font-size: 1.5rem; letter-spacing: 0.5rem; text-align: center;">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: var(--space-4);">Update PIN</button>
            </form>
        </div>
    </div>

    <script src="js/settings.js"></script>
    <script src="js/pwa.js"></script>
</body>
</html>
