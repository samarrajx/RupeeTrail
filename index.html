<!DOCTYPE html>
<html lang="en">
<head>
    <script>
      (function() {
        try {
          var s = localStorage.getItem('rupeetrail_settings');
          if (s) {
            var theme = JSON.parse(s).theme;
            if (theme === 'dark') document.documentElement.setAttribute('data-theme','dark');
            else if (theme === 'light') document.documentElement.setAttribute('data-theme','light');
          }
        } catch(e) {}
      })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Login - RupeeTrail</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <meta name="theme-color" content="#F4F7FF" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0B0F19" media="(prefers-color-scheme: dark)">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <style>
        .auth-message {
            text-align: center;
            margin-bottom: var(--space-6);
            color: var(--text-secondary);
            min-height: 24px;
            font-weight: var(--font-weight-medium);
        }
        
        .auth-logo {
            display: flex;
            justify-content: center;
            margin-bottom: var(--space-2);
            color: var(--color-primary);
            font-size: var(--font-size-4xl);
        }
    </style>
</head>
<body>
    <div class="auth-container animate-fade-in">
        <div class="auth-card" id="authCard">
            <div class="auth-header">
                <div class="auth-logo"><i class='bx bx-wallet-alt'></i></div>
                <h2>RupeeTrail</h2>
            </div>
            
            <div class="auth-message" id="authMessage">Enter your PIN</div>
            
            <div class="pin-display" id="pinDisplay">
                <div class="pin-dot"></div>
                <div class="pin-dot"></div>
                <div class="pin-dot"></div>
                <div class="pin-dot"></div>
            </div>
            
            <div class="keypad">
                <div class="keypad-btn" data-key="1">1</div>
                <div class="keypad-btn" data-key="2">2</div>
                <div class="keypad-btn" data-key="3">3</div>
                <div class="keypad-btn" data-key="4">4</div>
                <div class="keypad-btn" data-key="5">5</div>
                <div class="keypad-btn" data-key="6">6</div>
                <div class="keypad-btn" data-key="7">7</div>
                <div class="keypad-btn" data-key="8">8</div>
                <div class="keypad-btn" data-key="9">9</div>
                <div class="keypad-btn transparent" id="keyClear">C</div>
                <div class="keypad-btn" data-key="0">0</div>
                <div class="keypad-btn transparent" id="keyBackspace"><i class='bx bx-backspace'></i></div>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/offline.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/pwa.js"></script>
</body>
</html>
