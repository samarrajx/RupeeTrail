<!DOCTYPE html>
<html lang="en">
<head>
    <script>
      (function() {
        try {
          var s = localStorage.getItem('rupeetrail_settings');
          if (s) {
            var theme = JSON.parse(s).theme;
            if (theme === 'dark') document.documentElement.setAttribute('data-theme','dark');
            else if (theme === 'light') document.documentElement.setAttribute('data-theme','light');
          }
        } catch(e) {}
      })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Reports - RupeeTrail</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <meta name="theme-color" content="#F4F7FF" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0B0F19" media="(prefers-color-scheme: dark)">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/offline.js"></script>
    <script src="js/state.js"></script>
    <script src="js/charts.js"></script>
</head>
<body>
    <div class="app-layout">
        <aside class="app-sidebar hide-on-mobile">
            <div class="sidebar-header"><h2>RupeeTrail</h2></div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-link" onclick="event.preventDefault(); UI.navigateTo('dashboard.html')"><i class='bx bx-grid-alt'></i> Dashboard</a>
                <a href="transactions.html" class="nav-link" onclick="event.preventDefault(); UI.navigateTo('transactions.html')"><i class='bx bx-list-ul'></i> Transactions</a>
                <a href="reports.html" class="nav-link active" onclick="event.preventDefault(); UI.navigateTo('reports.html')"><i class='bx bx-pie-chart-alt-2'></i> Reports</a>
                <a href="accounts.html" class="nav-link" onclick="event.preventDefault(); UI.navigateTo('accounts.html')"><i class='bx bx-wallet'></i> Accounts</a>
                <a href="settings.html" class="nav-link" onclick="event.preventDefault(); UI.navigateTo('settings.html')"><i class='bx bx-cog'></i> Settings</a>
            </nav>
        </aside>

        <div class="app-main">
            <header class="app-header">
                <div class="header-left">
                    <h1 class="page-title">Reports</h1>
                    <span class="sync-indicator" id="sync-indicator"></span>
                </div>
                <div class="header-right" style="display: flex; gap: 15px; align-items: center;">
                    <i class='bx bx-log-out hide-on-desktop' style="font-size: 24px; color: var(--text-muted); cursor: pointer;" onclick="UI.logout()"></i>
                    <div class="user-popover-container">
                        <i class='bx bx-user-circle user-popover-btn' onclick="UI.toggleUserDropdown(event)"></i>
                        <div class="user-popover" id="userPopover">
                            <a href="settings.html" class="user-popover-item"><i class='bx bx-cog'></i> Settings</a>
                            <div class="user-popover-item" onclick="UI.logout()"><i class='bx bx-log-out'></i> Logout</div>
                        </div>
                    </div>
                </div>
            </header>

            <main class="app-content animate-fade-in">
                <!-- Filters -->
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-4);">
                    <h2 style="margin:0; font-size: var(--font-size-lg);">Overview</h2>
                    <div style="display: flex; gap: var(--space-2); align-items: center;">
                        <button id="exportBtn" class="btn btn-primary" style="padding: 0.35rem 0.75rem; font-size: var(--font-size-sm);"><i class='bx bx-download'></i> Export PDF</button>
                        <select class="form-select" style="width: auto; padding-top: 0.25rem; padding-bottom: 0.25rem;" id="timeframeFilter">
                            <option value="thisMonth">This Month</option>
                            <option value="lastMonth">Last Month</option>
                        <option value="ytd">Year to Date</option>
                        </select>
                    </div>
                </div>

                <!-- Statistics -->
                <div class="report-stats" id="statsContainer">
                    <div class="card stat-card">
                        <div class="stat-title">Total Income</div>
                        <div class="stat-value" id="statIncome" style="color: var(--color-secondary);">₹0</div>
                    </div>
                    <div class="card stat-card">
                        <div class="stat-title">Total Expenses</div>
                        <div class="stat-value" id="statExpense" style="color: var(--color-danger);">₹0</div>
                    </div>
                    <div class="card stat-card">
                        <div class="stat-title">Net Savings</div>
                        <div class="stat-value" id="statSavings">₹0</div>
                    </div>
                </div>

                <!-- Charts Grid -->
                <div class="grid lg:grid-cols-2 gap-6 mb-8" style="margin-bottom: var(--space-6);">
                    <div class="card chart-box" style="padding: var(--space-4);">
                        <h3 style="margin: 0 0 var(--space-4) 0; font-size: var(--font-size-md);">Spending by Category</h3>
                        <div style="position: relative; height: 250px;">
                            <canvas id="categoryChart"></canvas>
                        </div>
                    </div>
                    <div class="card chart-box" style="padding: var(--space-4);">
                        <h3 style="margin: 0 0 var(--space-4) 0; font-size: var(--font-size-md);">Daily Spending Trend</h3>
                        <div style="position: relative; height: 250px;">
                            <canvas id="trendChart"></canvas>
                        </div>
                    </div>
                </div>

                <!-- Table -->
                <div class="card chart-box" style="margin-bottom: var(--space-8); padding: var(--space-4);">
                    <h3 style="margin: 0 0 var(--space-4) 0; font-size: var(--font-size-md);">Category Breakdown (Expenses)</h3>
                    <div style="overflow-x: auto;">
                        <table style="width: 100%; border-collapse: collapse; text-align: left;">
                            <thead>
                                <tr style="border-bottom: 1px solid var(--border-light); color: var(--text-muted); font-size: var(--font-size-sm);">
                                    <th style="padding: var(--space-2);">Category</th>
                                    <th style="padding: var(--space-2); text-align: right;">Amount</th>
                                    <th style="padding: var(--space-2); text-align: right;">% of Total</th>
                                </tr>
                            </thead>
                            <tbody id="breakdownTableBody">
                                <!-- Populated by JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>

            <nav class="bottom-nav hide-on-desktop">
                <a href="dashboard.html" class="nav-item" onclick="event.preventDefault(); UI.navigateTo('dashboard.html')"><i class='bx bx-grid-alt'></i><span>Dash</span></a>
                <a href="transactions.html" class="nav-item" onclick="event.preventDefault(); UI.navigateTo('transactions.html')"><i class='bx bx-list-ul'></i><span>Txns</span></a>
                <a href="reports.html" class="nav-item active" onclick="event.preventDefault(); UI.navigateTo('reports.html')"><i class='bx bx-pie-chart-alt-2'></i><span>Reports</span></a>
                <a href="accounts.html" class="nav-item" onclick="event.preventDefault(); UI.navigateTo('accounts.html')"><i class='bx bx-wallet'></i><span>Accounts</span></a>
                <a href="settings.html" class="nav-item" onclick="event.preventDefault(); UI.navigateTo('settings.html')"><i class='bx bx-cog'></i><span>Settings</span></a>
            </nav>
        </div>
    </div>

    <!-- jsPDF and autoTable for PDF Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

    <script src="js/reports.js"></script>
    <script src="js/pwa.js"></script>
</body>
</html>
