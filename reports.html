<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reports - RupeeTrail</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4F46E5">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/offline.js"></script>
    <script src="js/state.js"></script>
    <script src="js/charts.js"></script>
</head>
<body>
    <div class="app-layout">
        <aside class="app-sidebar hide-on-mobile">
            <div class="sidebar-header"><h2>RupeeTrail</h2></div>
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-link"><i class='bx bx-home'></i> Home</a>
                <a href="dashboard.html" class="nav-link"><i class='bx bx-grid-alt'></i> Dashboard</a>
                <a href="transactions.html" class="nav-link"><i class='bx bx-list-ul'></i> Transactions</a>
                <a href="reports.html" class="nav-link active"><i class='bx bx-pie-chart-alt-2'></i> Reports</a>
                <a href="accounts.html" class="nav-link"><i class='bx bx-wallet'></i> Accounts</a>
                <a href="settings.html" class="nav-link"><i class='bx bx-cog'></i> Settings</a>
            </nav>
        </aside>

        <div class="app-main">
            <header class="app-header">
                <div class="header-left"><h1 class="page-title">Reports</h1></div>
                <div class="header-right">
                    <button id="exportBtn" class="btn btn-secondary" style="border-radius: var(--radius-full); padding: var(--space-2) var(--space-4);">
                        <i class='bx bx-export' style="margin-right: 0.5rem;"></i> Export
                    </button>
                </div>
            </header>

            <main class="app-content animate-fade-in">
                <!-- Filters -->
                <div style="display: flex; justify-content: flex-end; margin-bottom: var(--space-4);">
                    <select class="form-select" style="width: auto;" id="timeframeFilter">
                        <option value="thisMonth">This Month</option>
                        <option value="lastMonth">Last Month</option>
                        <option value="ytd">Year to Date</option>
                    </select>
                </div>

                <!-- Statistics -->
                <div class="report-stats" id="statsContainer">
                    <div class="stat-card"><div class="stat-title">Total Spending</div><div class="stat-value" id="statTotal">₹0</div></div>
                    <div class="stat-card"><div class="stat-title">Avg Daily Spend</div><div class="stat-value" id="statAvg">₹0</div></div>
                    <div class="stat-card"><div class="stat-title">Highest Category</div><div class="stat-value" id="statHigh" style="font-size: 1.25rem;">-</div></div>
                </div>

                <!-- Charts Grid -->
                <div class="charts-grid">
                    <div class="chart-box">
                        <h3 style="margin: 0 0 var(--space-4) 0; font-size: var(--font-size-md);">Spending by Category</h3>
                        <div style="position: relative; height: 250px;">
                            <canvas id="categoryChart"></canvas>
                        </div>
                    </div>
                    <div class="chart-box">
                        <h3 style="margin: 0 0 var(--space-4) 0; font-size: var(--font-size-md);">Spending Trend</h3>
                        <div style="position: relative; height: 250px;">
                            <canvas id="trendChart"></canvas>
                        </div>
                    </div>
                </div>

                <!-- Table -->
                <div class="chart-box" style="margin-bottom: var(--space-8);">
                    <h3 style="margin: 0 0 var(--space-4) 0; font-size: var(--font-size-md);">Category Breakdown</h3>
                    <div style="overflow-x: auto;">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Category</th>
                                    <th>Amount</th>
                                    <th>% of Total</th>
                                </tr>
                            </thead>
                            <tbody id="breakdownTableBody">
                                <!-- Populated by JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>

            <nav class="bottom-nav hide-on-desktop">
                <a href="index.html" class="nav-item"><i class='bx bx-home'></i><span>Home</span></a>
                <a href="dashboard.html" class="nav-item"><i class='bx bx-grid-alt'></i><span>Dash</span></a>
                <a href="transactions.html" class="nav-item"><i class='bx bx-list-ul'></i><span>Txns</span></a>
                <a href="reports.html" class="nav-item active"><i class='bx bx-pie-chart-alt-2'></i><span>Reports</span></a>
                <a href="settings.html" class="nav-item"><i class='bx bx-cog'></i><span>Settings</span></a>
            </nav>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/reports.js"></script>
    <script src="js/pwa.js"></script>
</body>
</html>
